name: EmotionSense CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib fastapi uvicorn pydantic pytest scipy
      - name: Run unit tests
        run: pytest tests/ -v
      - name: Verify project structure
        run: |
          echo "Files:" && ls -la
          echo "Model dir:" && ls model/

  docker-deploy:
    needs: test-and-train
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t emotionsense .
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Push to Docker Hub
        run: |
          docker tag emotionsense ${{ secrets.DOCKER_USERNAME }}/emotionsense:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/emotionsense:latest
